services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roombeat
      POSTGRES_PASSWORD: roombeat
      POSTGRES_DB: roombeat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @roombeat/api dev"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://roombeat:roombeat@postgres:5432/roombeat
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
    depends_on:
      - postgres
      - redis

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @roombeat/web dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
